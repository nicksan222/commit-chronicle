name: Bug Report
description: Report a bug with Commit Chronicles
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: Workflow configuration
      description: Your workflow YAML (redact secrets).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Action logs
      description: Relevant output from the GitHub Actions run.
      render: text
  - type: dropdown
    id: provider
    attributes:
      label: AI Provider
      options:
        - openai
        - anthropic
        - google
    validations:
      required: true

name: "Commit Chronicles"
description: "Generate an AI-powered team activity pulse from recent commits and post it to your messaging platform"
author: "nicksan222"

inputs:
  time_range:
    description: "How far back to look for commits (e.g. 24h, 7d, 1m)"
    required: true
    default: "7d"
  ai_provider:
    description: "AI provider to use (openai, anthropic, google)"
    required: true
  ai_api_key:
    description: "API key for the chosen AI provider"
    required: true
  ai_model:
    description: "Model to use (defaults: gpt-4o for openai, claude-sonnet-4-20250514 for anthropic, gemini-2.5-flash for google)"
    required: false
  slack_webhook_url:
    description: "Slack incoming webhook URL"
    required: true

runs:
  using: "node20"
  main: "dist/index.js"

branding:
  icon: "activity"
  color: "purple"
